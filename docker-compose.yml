version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: flowdesk_postgres
    restart: always
    environment:
      POSTGRES_DB: flowdesk
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: flowdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: